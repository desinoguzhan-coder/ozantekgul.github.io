    <style>
        :root {
            --gold: #b89a67; 
            --glass: rgba(12, 12, 13, 0.96); 
            --border: rgba(184, 154, 103, 0.1); 
            --text-main: #f8f8f8;
            --text-dim: rgba(248, 248, 248, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-style: normal !important; }

        body {
            background: #050505;
            background-image: 
                linear-gradient(rgba(184, 154, 103, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(184, 154, 103, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            perspective: 1200px;
        }

        #canvas-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.3; }

        .scene {
            position: relative; z-index: 10; width: 100%; max-width: 550px;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d; pointer-events: none;
            padding: 20px;
        }

        .crystal-card {
            width: 100%; 
            height: 380px; 
            background: var(--glass);
            border: 1px solid var(--border);
            border-top: 1px solid rgba(184, 154, 103, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.8);
            position: relative; padding: 35px 30px;
            display: flex; flex-direction: column; justify-content: center;
            transform-origin: center center;
            z-index: 20; pointer-events: auto;
            opacity: 1; transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            animation: floatUI 6s ease-in-out infinite;
        }

        @keyframes floatUI {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .crystal-card:hover { border-color: var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.7); animation-play-state: paused; }

        .hover-cmd { position: absolute; top: 15px; left: 0; width: 100%; text-align: center; font-family: 'Cinzel', serif; font-size: 0.45rem; letter-spacing: 3px; color: var(--gold); opacity: 0.6; z-index: 5; }

        .header { text-align: center; transition: all 0.5s ease;}
        .crystal-card:hover .header { opacity: 0; transform: scale(0.95); }

        .title {
            font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 700;
            color: var(--gold);
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(184, 154, 103, 0.3);
            line-height: 1.2;
        }
        .subtitle {
            display: block; font-size: 0.55rem; color: var(--text-dim);
            letter-spacing: 4px; margin-top: 15px; text-transform: uppercase; line-height: 1.6;
        }

        .signal-overlay {
            position: absolute; inset: 0; padding: 35px 30px;
            display: flex; flex-direction: column;
            opacity: 0; transform: translateY(10px);
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none; z-index: 5;
            background: var(--glass);
        }
        .crystal-card:hover .signal-overlay { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .bp-line { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        .bp-code { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--gold); letter-spacing: 4px; }

        textarea {
            flex-grow: 1; 
            background: rgba(5, 5, 10, 0.4);
            border: 1px solid rgba(184, 154, 103, 0.1); 
            border-radius: 2px; padding: 15px;
            color: var(--text-main); font-family: 'Montserrat', sans-serif; 
            font-size: 0.75rem; line-height: 1.6; font-weight: 300;
            resize: none; outline: none; transition: all 0.4s ease;
            margin-bottom: 15px;
        }
        textarea:focus { border-color: rgba(184, 154, 103, 0.3); background: rgba(10, 10, 20, 0.6); }
        textarea::placeholder { color: var(--text-dim); }

        .action-wrapper { margin-top: auto; }

        .premium-btn {
            display: block; text-align: center; text-decoration: none; border: 1px solid var(--gold); color: var(--gold); padding: 12px;
            font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 4px; transition: 0.4s; background: rgba(184, 154, 103, 0.05);
            text-transform: uppercase; cursor: pointer;
        }
        .premium-btn:hover { background: var(--gold); color: #000; letter-spacing: 6px; }

        .envelope-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 340px; height: 220px; z-index: 50; opacity: 0; display: none; pointer-events: none; transition: opacity 3s cubic-bezier(0.19, 1, 0.22, 1); }
        .envelope-body { width: 100%; height: 100%; background: linear-gradient(135deg, #120a1f 0%, #050508 100%); box-shadow: 0 35px 80px rgba(0,0,0,0.95); position: relative; border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden; }
        .flap { position: absolute; top: 0; left: 0; border-left: 175px solid transparent; border-right: 175px solid transparent; border-top: 140px solid #1a1025; z-index: 2; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8)); }
        
        .royal-seal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.5);
            width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b89a67, #000); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.7), inset 0 0 15px rgba(0,0,0,0.3);
            z-index: 10; opacity: 0; display: flex; justify-content: center; align-items: center;
            font-family: 'Cinzel', serif; font-weight: 700; font-size: 1.8rem; 
            color: #000; 
            border: 2px solid rgba(255,223,100,0.3);
        }

        .crystal-card.shake { animation: errorShake 0.5s ease-in-out !important; }
        @keyframes errorShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .crystal-card.fly-up { animation: cardAscend 3.5s forwards cubic-bezier(0.4, 0, 0.2, 1) !important; pointer-events: none; }
        @keyframes cardAscend { 0% { transform: rotateX(0) rotateY(0) translateY(0) scale(1); opacity: 1; } 100% { transform: rotateX(20deg) rotateY(0) translateY(-150vh) scale(0.5); opacity: 0; } }
        
        .envelope-container.show { display: block; animation: fadeInEnv 3s forwards; }
        @keyframes fadeInEnv { from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

        .royal-seal.stamp-down { animation: stampSlam 1s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; }
        @keyframes stampSlam { 0% { transform: translate(-50%, -50%) scale(4); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .envelope-container.sent { animation: ascend 10s ease-in-out forwards; }
        @keyframes ascend { 0% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -400px) scale(0.5); opacity: 0; } }

        .final-message {
            position: absolute; top: 55%; width: 100%; text-align: center;
            font-family: 'Cinzel'; font-size: 1rem; letter-spacing: 6px; color: var(--gold);
            opacity: 0; transition: opacity 3s; text-shadow: 0 0 20px rgba(184, 154, 103, 0.6); pointer-events: none;
            padding: 0 20px; line-height: 1.5;
        }
        .final-message.visible { opacity: 1; }

        /* Geri Dön Butonu */
        .back-nav {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            text-decoration: none; font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--text-dim);
            letter-spacing: 5px; transition: 0.5s; z-index: 100;
        }
        .back-nav:hover { color: var(--gold); letter-spacing: 7px; }

        @media (max-width: 768px) { .crystal-card { animation: none; height: auto; min-height: 380px; } }
    </style>
</head>
<body>

    <audio id="letterMusic" loop preload="auto"></audio>
    <canvas id="canvas-bg"></canvas>

    <div class="scene">
        <div class="crystal-card" id="mainCard">
            <div class="hover-cmd">[ FAREYİ ÜZERİNE GETİR // SİNYAL GÖNDER ]</div>
            
            <div class="header">
                <div class="title">ANA FREKANS</div>
                <span class="subtitle">DİJİTAL MİMARIN KİŞİSEL AĞINA BAĞLANDINIZ.<br>DOĞRUDAN BANA ULAŞMAK İÇİN BİR SİNYAL OLUŞTURUN.</span>
            </div>
            
            <div class="signal-overlay">
                <div class="bp-line"><span class="bp-code">LOG_ID: INCOMING_SIGNAL</span></div>
                <textarea id="letterText" placeholder="Kendi frekansından benimkine bir mesaj bırak..."></textarea>
                <div class="action-wrapper">
                    <div class="premium-btn" onclick="sendToFuture()">SİNYALİ BANA İLET</div>
                </div>
            </div>
        </div>

        <div class="envelope-container" id="envelope">
            <div class="envelope-body"><div class="flap"></div></div>
            <div class="royal-seal" id="seal">OT</div>
        </div>
    </div>

    <div class="final-message" id="endText">SİNYALİN BANA ULAŞTI. BAĞLANTI KURULDU.</div>

    <a href="index.html" class="back-nav">KAYITLARA DÖN</a>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    document.addEventListener('click', function playOnInteraction() {
                        audio.play();
                        document.removeEventListener('click', playOnInteraction);
                    }, { once: true });
                });
            }
        });

        const card = document.getElementById('mainCard');
        function handleTilt(e) {
            if(card.classList.contains('fly-up')) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        }
        document.addEventListener('mousemove', handleTilt);
        document.addEventListener('mouseleave', () => {
            if(card.classList.contains('fly-up')) return;
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * width; this.y = Math.random() * height; this.size = Math.random() * 2; this.speedX = (Math.random() - 0.5) * 0.15; this.speedY = (Math.random() - 0.5) * 0.15; this.life = Math.random(); }
            update() { this.x += this.speedX; this.y += this.speedY; this.life += 0.005; if(this.x < -50 || this.x > width+50 || this.y < -50 || this.y > height+50) this.reset(); }
            draw() { const opacity = (Math.sin(this.life * 2) + 1) / 2 * 0.6; ctx.fillStyle = `rgba(184, 154, 103, ${opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
        }
        for(let i=0; i<80; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0,0,width,height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animate); }
        animate();

        function sendToFuture() {
            const txt = document.getElementById('letterText');
            if(txt.value.trim() === "") {
                card.classList.add('shake');
                txt.style.borderColor = "#ff4d4d";
                txt.placeholder = "Lütfen önce bir sinyal verisi girin...";
                setTimeout(() => {
                    card.classList.remove('shake');
                    txt.style.borderColor = "rgba(184, 154, 103, 0.1)";
                }, 600);
                return;
            }

            // KANKA: Kendi EmailJS Service ID, Template ID ve Public Key'ini girerek sistemi aktif edebilirsin.
            // const templateParams = { message: txt.value.trim() };
            // emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams, 'YOUR_PUBLIC_KEY')
            // .then(() => console.log('Sinyal gitti!'))
            // .catch(err => console.error('Hata:', err));

            const env = document.getElementById('envelope');
            const seal = document.getElementById('seal');
            const msg = document.getElementById('endText');

            document.removeEventListener('mousemove', handleTilt);
            card.style.transform = 'translateY(0)'; 
            requestAnimationFrame(() => { card.classList.add('fly-up'); });

            setTimeout(() => { env.classList.add('show'); }, 2000);
            setTimeout(() => { seal.classList.add('stamp-down'); }, 5000);
            setTimeout(() => { env.classList.add('sent'); msg.classList.add('visible'); }, 7000);
            setTimeout(() => { resetSystem(); }, 14000);
        }

        function resetSystem() {
            const card = document.getElementById('mainCard');
            const env = document.getElementById('envelope');
            const seal = document.getElementById('seal');
            const msg = document.getElementById('endText');
            const txt = document.getElementById('letterText');

            msg.classList.remove('visible');
            card.classList.remove('fly-up');
            env.classList.remove('show', 'sent');
            seal.classList.remove('stamp-down');
            card.style.opacity = '0';
            card.style.transform = 'translateY(50px)';
            txt.value = "";
            txt.placeholder = "Ana frekansa şifresiz bir sinyal gönder...";

            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(0) rotateX(0) rotateY(0)';
                setTimeout(() => { card.style.transform = ''; document.addEventListener('mousemove', handleTilt); }, 1000);
            }, 500);
        }
    </script>
</body>
