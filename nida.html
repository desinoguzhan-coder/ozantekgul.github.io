<!DOCTYPE html>
<html lang="tr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QWMY8YQQ9Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QWMY8YQQ9Q');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NİDA | Ozan Tekgül</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@100;300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-style: normal !important;}
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #canvas-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        
        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 130%);
            z-index: 10; pointer-events: none;
        }

        /* --- YENİ NESİL MÜHÜR: SINGULARITY (Uzay Teması) --- */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 2s ease, visibility 2s;
            background: rgba(0,0,0,0.85); /* Derinlik hissi için hafif şeffaf */
        }

        .singularity-muehur {
            position: relative;
            width: 160px; height: 160px; /* Biraz daha küçük ve minimalist */
            border-radius: 50%;
            cursor: pointer;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
            
            /* Ana Tekillik Gövdesi (Süzülen Mücevher) */
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(164, 240, 255, 0.05); /* Çok silik turkuaz */
            box-shadow: 0 0 20px rgba(0,0,0,0.9);
            
            /* Süzülme Animasyonu */
            animation: floatUI 6s ease-in-out infinite;
        }

        @keyframes floatUI {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Olay Ufku (Glow Efekti) */
        .singularity-muehur::before {
            content: ''; position: absolute; inset: -1px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(164, 240, 255, 0.05) 0%, transparent 40%, rgba(164, 240, 255, 0.05) 100%);
            z-index: -1; transition: all 1s ease;
            opacity: 0.5;
        }

        /* Hover Durumu (Mühürleme) */
        .singularity-muehur:hover {
            border-color: rgba(164, 240, 255, 0.4);
            background: rgba(164, 240, 255, 0.02);
            box-shadow: 0 0 50px rgba(164, 240, 255, 0.2);
            animation-play-state: paused; /* Hoverda süzülmeyi durdur */
        }
        
        .singularity-muehur:hover::before { 
            inset: -8px; 
            opacity: 1; 
            background: linear-gradient(135deg, rgba(164, 240, 255, 0.2) 0%, rgba(164, 240, 255, 0.05) 50%, rgba(164, 240, 255, 0.2) 100%);
        }

        .muehur-label {
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .muehur-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            line-height: 1.2;
            padding: 0 10px;
        }

        /* --- ANA EKRAN VE NABIZ --- */
        #main-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transition: opacity 3s ease;
        }

        .heartbeat-wrapper {
            width: 100%; max-width: 900px; height: 200px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        .heartbeat-svg {
            width: 100%; height: 100%; overflow: visible;
            filter: drop-shadow(0 0 4px rgba(164, 240, 255, 0.5));
        }

        .heartbeat-path-bg {
            fill: none; stroke: rgba(255, 255, 255, 0.03); stroke-width: 1;
        }

        .heartbeat-path-pulse {
            fill: none;
            stroke: #a4f0ff; 
            stroke-width: 2;
            stroke-linecap: square;
            stroke-linejoin: round;
            stroke-dasharray: 150 1400; 
            stroke-dashoffset: 1550;
            animation: pulseTravel 4s linear infinite;
            opacity: 0.9;
        }

        @keyframes pulseTravel {
            0% { stroke-dashoffset: 1550; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }

        /* --- MÜHÜRLÜ BAŞLIK (BEYAZ) --- */
        #fixed-title {
            position: absolute;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem; 
            color: #fff; 
            text-align: center;
            pointer-events: none;
            opacity: 1; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            letter-spacing: 4px;
            z-index: 40;
            top: 25%;
            width: 80%;
            max-width: 600px;
            line-height: 1.6;
        }

    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas> 
    <div class="vignette"></div>

    <audio id="poemAudio" src="ismet.mp3" loop preload="auto"></audio>

    <div id="intro-layer">
        <div class="singularity-muehur" onclick="startExperience()">
            <span class="muehur-label">BAŞLAT</span>
            <span class="muehur-title">ŞİVEKÂR'IN YOLCULUĞU</span>
        </div>
    </div>

    <div id="main-layer">
        <div id="fixed-title">Üçüncü Bab: Şivekâr'ın Yolculuğudur - İsmet Özel</div>
        
        <div class="heartbeat-wrapper">
            <svg class="heartbeat-svg" viewBox="0 0 600 100" preserveAspectRatio="none">
                <path id="heart-path-bg" class="heartbeat-path-bg" d="M0,50 L600,50" />
                <path id="heart-path-pulse" class="heartbeat-path-pulse" d="M0,50 L600,50" />
            </svg>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        
        function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class Star {
            constructor() { this.reset(); }
            reset() { this.x = (Math.random() - 0.5) * width * 2; this.y = (Math.random() - 0.5) * height * 2; this.z = Math.random() * width; }
            update() { this.z -= 0.2; if (this.z < 1) { this.reset(); this.z = width; } }
            draw() {
                let sx = (width/2) + (this.x / this.z) * (width/2);
                let sy = (height/2) + (this.y / this.z) * (height/2);
                const depth = (1 - this.z / width);
                ctx.fillStyle = `rgba(200, 230, 255, ${depth * 0.8})`; 
                ctx.beginPath(); ctx.arc(sx, sy, depth * 1.2, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 700; i++) stars.push(new Star());
        function animate() { 
            ctx.fillStyle = "rgba(0, 0, 0, 0.3)"; ctx.fillRect(0, 0, width, height); 
            stars.forEach(s => { s.update(); s.draw(); }); 
            requestAnimationFrame(animate); 
        }
        animate();

        function startExperience() {
            const intro = document.getElementById('intro-layer');
            const main = document.getElementById('main-layer');
            const audio = document.getElementById('poemAudio');

            intro.style.opacity = '0';
            intro.style.visibility = 'hidden';

            setTimeout(() => {
                main.style.visibility = 'visible';
                main.style.opacity = '1';
                const newPath = generateRandomHeartbeat();
                document.getElementById('heart-path-bg').setAttribute('d', newPath);
                document.getElementById('heart-path-pulse').setAttribute('d', newPath);
            }, 1000);

            audio.volume = 0.8; 
            audio.play().catch(e => console.log("Ses hatası"));
        }

        const bgPath = document.getElementById('heart-path-bg');
        const pulsePath = document.getElementById('heart-path-pulse');

        pulsePath.addEventListener('animationiteration', () => {
            const newPath = generateRandomHeartbeat();
            bgPath.setAttribute('d', newPath);
            pulsePath.setAttribute('d', newPath);
        });

        function generateRandomHeartbeat() {
            const totalWidth = 600;
            const centerY = 50;
            const beatStart = Math.floor(Math.random() * 250) + 150; 
            const spikeUp = Math.floor(Math.random() * 30) + 10; 
            const spikeDown = Math.floor(Math.random() * 20) + 10; 

            let path = `M0,${centerY} L${beatStart},${centerY}`; 
            path += ` L${beatStart+20},${centerY - spikeUp}`; 
            path += ` L${beatStart+40},${centerY + spikeDown}`; 
            path += ` L${beatStart+60},${centerY}`;         
            path += ` L${totalWidth},${centerY}`;

            return path;
        }
    </script>
</body>
</html>
